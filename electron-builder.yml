appId: com.hibit.app
productName: Hi-Bit
copyright: Copyright (c) 2026 Kun Chen
artifactName: ${productName}-${version}-${os}-${arch}.${ext}

directories:
  output: dist
  buildResources: build

asar: true

files:
  - out/**/*
  - package.json
  - "!**/*.map"
  - "!**/*.md"

# Bundled Hi-Bit skills (SKILL.md + references). Copied verbatim to
# `resourcesPath/skills` so they survive the `!**/*.md` filter above and the
# worker can read them on disk at runtime.
extraResources:
  - from: skills
    to: skills
  # Bit's own curated skills (teach-subject), kept apart from the bots' skills
  # so the coordinator and the bots each load only their own doctrine.
  - from: skills-bit
    to: skills-bit
  # Bit's brand mascot, so the `view_bit` tool can rasterise it at runtime and let
  # Bit and bots see exactly what Bit looks like. Copied out of the dev-only
  # `design/` tree (which is otherwise not packaged) to `resourcesPath/brand`.
  - from: design/assets/mascot-boo.svg
    to: brand/mascot-boo.svg

mac:
  category: public.app-category.education
  icon: build/icon.icns
  extendInfo:
    # The visible app name (Finder, Dock, menu bar) reads "Hi Bit", with a space.
    # CFBundleName stays "Hi-Bit" (from productName) on purpose: macOS derives the
    # Electron userData path from CFBundleName, and our DMG/zip artifact names and
    # the Homebrew cask URLs are all hyphenated - overriding only the display name
    # keeps every existing install's data, downloads, and cask in place.
    CFBundleDisplayName: Hi Bit
    # Lets a kid snap a photo of a drawing or build to show Bit. macOS requires this
    # string before the webcam can open, even for unsigned builds.
    NSCameraUsageDescription: Hi-Bit uses the camera so you can take a picture to show Bit.
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false
  x64ArchFiles: Contents/Resources/app.asar.unpacked/node_modules/koffi/**

dmg:
  writeUpdateInfo: false

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

linux:
  category: Education
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64

publish: null
