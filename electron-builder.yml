appId: com.hibit.app
productName: Hi-Bit
copyright: Copyright (c) 2026 Kun Chen
artifactName: ${productName}-${version}-${os}-${arch}.${ext}

directories:
  output: dist
  buildResources: build

asar: true

files:
  - out/**/*
  - package.json
  - "!**/*.map"
  - "!**/*.md"

extraResources:
  - from: graph
    to: graph
    filter:
      - "**/*"
  - from: prompts
    to: prompts
    filter:
      - "**/*"

mac:
  category: public.app-category.education
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false

dmg:
  writeUpdateInfo: false

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

linux:
  category: Education
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64

publish: null
