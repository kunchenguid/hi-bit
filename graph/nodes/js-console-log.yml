id: js-console-log
title_parent: console.log and the dev console
title_kid: how to print something so only you see it
why_kid: this is your secret message channel with the computer - you use it to peek inside your code and see what it's actually doing while it runs, without your visitors ever seeing it.
area: js
prereqs: [js-instructions-basics]
introduces: [console-log, dev-tools-console, debug-output]
mastery_signals:
  saw_it: Bit wrote a console.log call in the kid's code, opened the dev console, and showed the kid the printed value appearing there instead of on the page.
  did_with_help: Kid wrote a console.log call and opened the dev console to see the output, with Bit reminding them where the console lives and what the line looks like.
  did_unprompted: Kid reached for console.log on their own to check what a value was while debugging, without Bit suggesting they print it.
  explained_it: Kid said that console.log prints something to a place only they can see, and that they use it to check what the computer is thinking.
