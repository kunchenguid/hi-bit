id: js-arrays
title_parent: Arrays and index access
title_kid: lists of things you can look up
why_kid: you can keep a bunch of things together (like jokes or dice faces) and ask your code for one whenever you want.
area: js
prereqs: [js-variables-let-const]
introduces: [array-literal, index-access, zero-based]
mastery_signals:
  saw_it: Bit built a small array of values in the kid's code, then read back one value by its index and pointed out that the first item is at index zero, not one.
  did_with_help: Kid created an array and read a value out of it by its index with Bit reminding them that arrays start counting at zero.
  did_unprompted: Kid reached for an array on their own to hold a small list of related values, without Bit suggesting a collection shape.
  explained_it: Kid said that an array is a list where every item has a number, and that the numbers start at zero for the first item.
