id: html-buttons
title_parent: Button elements
title_kid: clickable buttons
why_kid: buttons are the thing on your page a visitor can actually push to make something happen.
area: html
prereqs: [html-page-body]
introduces: [button-tag, interactive-element]
mastery_signals:
  saw_it: Bit added a button element to the kid's page and pointed out that it looks like a clickable button in the preview.
  did_with_help: Kid wrote a button element with label text while Bit reminded them of the tag shape.
  did_unprompted: Kid added a button to their page on a new step without Bit bringing up buttons.
  explained_it: Kid described a button as an element a person can click, and said the words between the tags are what shows up on the button.
