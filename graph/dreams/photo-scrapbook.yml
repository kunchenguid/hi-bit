id: photo-scrapbook
title_parent: Photo scrapbook
title_kid: a scrapbook wall where you stick photos wherever you want
summary_kid: a page with a scrapbook area and a box where you paste a picture link. every time you click stick it, that picture shows up in the scrapbook at a random spot, a little see-through like an old photo left out in the sun
emoji: "📷"
categories: [creative, personal]
interest_tags: [scrapbook, photos, memories, collage, design]
