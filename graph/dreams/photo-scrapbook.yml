  - html-images
  - html-inputs-text
  - html-labels
  - html-buttons
  - css-attach
  - css-background
  - css-width-height
  - css-position-absolute
  - css-opacity
  - js-attach
  - dom-query-selector
  - dom-create-append
  - dom-set-attribute
  - dom-input-value
  - events-click
  - js-math-random
style_hints:
  - the scrapbook background color or paper look
  - how big each photo is
  - how see-through the photos are
  - what the stick it button says
  - the title at the top of the scrapbook
