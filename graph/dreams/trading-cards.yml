  - css-colors
  - css-background
  - css-border-radius
  - css-flex-basics
  - js-attach
  - dom-query-selector
  - dom-create-append
  - dom-text-content
  - js-arrays
  - js-objects
  - js-for-of
  - state-array-in-dom
style_hints:
  - what kind of cards (heroes, pets, pokemon-style, snack monsters...)
  - how many cards to show
  - the name, power, and color for each card
  - the card shape and border style
