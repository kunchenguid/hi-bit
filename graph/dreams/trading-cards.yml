id: trading-cards
title_parent: Trading cards
title_kid: a trading card collection page you design yourself
summary_kid: a page that shows a row of trading cards you made up - each card has a name, a power, and its own color, and they all come from a list you typed at the top of your code
emoji: "🎴"
categories: [creative, utility]
interest_tags: [collections, cards, characters, design, games]
