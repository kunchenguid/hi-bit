  - html-inputs-number
  - html-labels
  - html-buttons
  - js-attach
  - dom-query-selector
  - dom-text-content
  - dom-input-value
  - events-click
  - js-numbers
  - js-math-random
  - js-comparison
  - js-if-else
  - state-counter
style_hints:
  - the range of the secret number (1 to 100, 1 to 20, etc)
  - what the page says for higher, lower, and correct guesses
  - whether you count and show how many guesses it took
