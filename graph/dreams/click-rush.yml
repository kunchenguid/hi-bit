  - html-text-headings
  - html-div-span
  - html-buttons
  - css-attach
  - css-colors
  - js-attach
  - dom-query-selector
  - dom-text-content
  - events-click
  - state-counter
  - timers-settimeout
  - project-score
  - project-reset
style_hints:
  - what the big button says (tap! smash! go!)
  - what color the page turns when time is up
  - what the page says next to your final score
