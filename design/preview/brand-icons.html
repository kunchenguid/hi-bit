<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../tokens/colors_and_type.css">
<style>
  body { margin:0; padding: 20px; background: var(--paper); width:660px; box-sizing:border-box; }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 14px; }
  figure { margin:0; display:flex; flex-direction:column; align-items:center; gap:6px; padding: 10px; background: var(--paper-3); border:1px solid var(--ink-12); border-radius: 8px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--ink-64); }
  .ic { color: var(--ink); image-rendering: pixelated; }
</style>
</head>
<body>
  <div class="grid">
    <figure><svg class="ic" width="32" height="32"><use href="../assets/icons.svg#i-home"/></svg><div class="lbl">home</div></figure>
    <figure><svg class="ic" width="32" height="32"><use href="../assets/icons.svg#i-book"/></svg><div class="lbl">book</div></figure>
    <figure><svg class="ic" width="32" height="32"><use href="../assets/icons.svg#i-chat"/></svg><div class="lbl">chat</div></figure>
    <figure><svg class="ic" width="32" height="32"><use href="../assets/icons.svg#i-code"/></svg><div class="lbl">code</div></figure>
    <figure><svg class="ic" width="32" height="32"><use href="../assets/icons.svg#i-trophy"/></svg><div class="lbl">trophy</div></figure>
    <figure><svg class="ic" width="32" height="32"><use href="../assets/icons.svg#i-star"/></svg><div class="lbl">star</div></figure>
    <figure><svg class="ic" style="color:#F26A4B" width="32" height="32"><use href="../assets/icons.svg#i-flame"/></svg><div class="lbl">flame</div></figure>
    <figure><svg class="ic" width="32" height="32"><use href="../assets/icons.svg#i-play"/></svg><div class="lbl">play</div></figure>
    <figure><svg class="ic" width="32" height="32"><use href="../assets/icons.svg#i-pause"/></svg><div class="lbl">pause</div></figure>
    <figure><svg class="ic" width="32" height="32"><use href="../assets/icons.svg#i-settings"/></svg><div class="lbl">settings</div></figure>
    <figure><svg class="ic" style="color:#7BD86E" width="32" height="32"><use href="../assets/icons.svg#i-check"/></svg><div class="lbl">check</div></figure>
    <figure><svg class="ic" width="32" height="32"><use href="../assets/icons.svg#i-close"/></svg><div class="lbl">close</div></figure>
    <figure><svg class="ic" style="color:#FFC244" width="32" height="32"><use href="../assets/icons.svg#i-hint"/></svg><div class="lbl">hint</div></figure>
    <figure><svg class="ic" style="color:#E84C88" width="32" height="32"><use href="../assets/icons.svg#i-heart"/></svg><div class="lbl">heart</div></figure>
  </div>
</body>
</html>
