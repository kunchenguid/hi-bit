<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../tokens/colors_and_type.css">
<style>
  body { margin:0; padding: 20px; background: var(--paper); width:660px; box-sizing:border-box; }
  .row { display: flex; flex-direction: column; gap: 10px; }
  .spec { display:flex; align-items: baseline; gap: 16px; border-bottom: 1px dashed var(--ink-12); padding-bottom: 8px; }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--ink-64); width: 90px; }
</style>
</head>
<body>
  <div class="row">
    <div class="spec"><span class="label">t-display</span><span class="t-display" style="font-size:32px">HI BIT</span></div>
    <div class="spec"><span class="label">t-h1</span><h1>Let's build a button</h1></div>
    <div class="spec"><span class="label">t-h2</span><h2>Lesson 3 — Styling</h2></div>
    <div class="spec"><span class="label">t-h3</span><h3>Pick a color</h3></div>
    <div class="spec"><span class="label">t-h4</span><h4>Try it yourself</h4></div>
    <div class="spec"><span class="label">t-body</span><p>You wrote 3 lines of code. Nice work — let's keep going.</p></div>
    <div class="spec"><span class="label">t-small</span><p class="t-small">3 of 8 · 24 XP</p></div>
  </div>
</body>
</html>
