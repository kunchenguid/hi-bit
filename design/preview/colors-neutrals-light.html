<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../tokens/colors_and_type.css">
<style>
  body { margin:0; padding: 20px; background: var(--paper); width:660px; box-sizing:border-box; }
  .row { display: flex; gap: 12px; }
  .swatch { flex:1; border-radius: var(--r-lg); border:1px solid var(--ink-12); overflow:hidden; box-shadow: var(--shadow-pixel-sm);}
  .chip { height: 64px; display:flex; align-items:flex-end; padding: 8px 10px; font-family: var(--font-pixel); font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em; }
  .meta { background: var(--paper-3); padding: 8px 10px; font-family: var(--font-mono); font-size: 11px; color: var(--ink-64); border-top:1px solid var(--ink-12);}
  .meta b { color: var(--ink); font-weight: 500; }
</style>
</head>
<body>
  <div class="row">
    <div class="swatch">
      <div class="chip" style="background:#F7F1E5;color:#1A1626">PAPER</div>
      <div class="meta"><b>--paper</b><br>#F7F1E5</div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#FFF9EC;color:#1A1626">PAPER-2</div>
      <div class="meta"><b>--paper-2</b><br>#FFF9EC</div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#FFFDF5;color:#1A1626">PAPER-3</div>
      <div class="meta"><b>--paper-3</b><br>#FFFDF5</div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#5A536B;color:#FFFDF5">INK-3</div>
      <div class="meta"><b>--ink-3</b><br>#5A536B</div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#1A1626;color:#FFFDF5">INK</div>
      <div class="meta"><b>--ink</b><br>#1A1626</div>
    </div>
  </div>
</body>
</html>
