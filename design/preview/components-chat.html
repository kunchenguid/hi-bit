<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../tokens/colors_and_type.css">
<style>
  body {
    margin:0; padding: 28px 24px;
    background: var(--paper);
    width: 660px; box-sizing: border-box;
    display: flex; flex-direction: column; gap: 16px;
    font-family: var(--font-ui);
  }

  /* Stream layout — each row is avatar + bubble, so the mascot
     reads at a size where you can actually see it's a robot. */
  .row { display: flex; gap: 12px; align-items: flex-end; }
  .row.you { justify-content: flex-end; }
  .row.bit .avatar-col { align-self: flex-start; padding-top: 4px; }

  .avatar-col { width: 48px; flex-shrink: 0; }
  .avatar {
    width: 48px; height: 48px;
    image-rendering: pixelated;
    display: block;
  }
  .avatar-label {
    margin-top: 2px;
    font-family: var(--font-pixel);
    font-size: 8px;
    color: var(--ink-64);
    text-align: center;
    letter-spacing: 0.08em;
  }

  .bubble {
    max-width: 440px;
    padding: 12px 14px;
    border-radius: 14px;
    box-shadow: 0 2px 0 0 #1A1626;
    font-size: 14px;
    line-height: 1.5;
    color: var(--ink);
  }
  /* Bit bubble: subject-neutral paper-3, tail on lower-left */
  .bit .bubble {
    background: var(--paper-3);
    border-bottom-left-radius: 4px;
  }
  /* User bubble: soft lavender-ink, tail on lower-right */
  .you .bubble {
    background: #EDEBFF;
    color: #3F2EB4;
    border-bottom-right-radius: 4px;
  }

  code {
    background: rgba(26,22,38,0.08);
    padding: 1px 6px;
    border-radius: 4px;
    font-family: var(--font-mono);
    font-size: 13px;
  }
</style>
</head>
<body>
  <div class="row bit">
    <div class="avatar-col">
      <img src="../assets/logo-mark.svg" class="avatar" alt="Bit">
      <div class="avatar-label">BIT</div>
    </div>
    <div class="bubble">
      Hey — ready to keep going? Yesterday you made a button say "hi." Today we'll teach it to count.
    </div>
  </div>

  <div class="row you">
    <div class="bubble">ok! how?</div>
  </div>

  <div class="row bit">
    <div class="avatar-col">
      <img src="../assets/logo-mark.svg" class="avatar" alt="Bit">
    </div>
    <div class="bubble">
      We'll make a variable called <code>count</code> and add 1 to it every click.
    </div>
  </div>
</body>
</html>
