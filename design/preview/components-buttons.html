<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../tokens/colors_and_type.css">
<style>
  body { margin:0; padding: 32px; background: var(--paper); width:660px; box-sizing:border-box; }
  .row { display:flex; gap: 14px; flex-wrap: wrap; align-items: center; }
  .btn {
    font-family: var(--font-ui);
    font-weight: 600;
    font-size: 15px;
    border: 2px solid #1A1626;
    border-radius: 12px;
    padding: 10px 18px;
    cursor: pointer;
    box-shadow: 0 3px 0 0 #1A1626;
    transition: transform 120ms, box-shadow 120ms;
  }
  .btn.primary { background: #6C5CE7; color: #FFFDF5; }
  .btn.subject { background: #FFC244; color: #1A1626; }
  .btn.ghost { background: var(--paper-3); color: #1A1626; }
  .btn.pill { border-radius: 999px; }
  .btn.pressed { transform: translateY(3px); box-shadow: 0 0 0 0 #1A1626; }
  .btn.small { font-size: 13px; padding: 6px 12px; }
</style>
</head>
<body>
  <div class="row">
    <button class="btn primary">Start a lesson</button>
    <button class="btn subject">Run code</button>
    <button class="btn ghost">Cancel</button>
    <button class="btn primary pressed">Pressed</button>
    <button class="btn primary pill small">+ New</button>
  </div>
</body>
</html>
