<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../tokens/colors_and_type.css">
<style>
  body { margin:0; padding: 20px; background: var(--paper); width:660px; box-sizing:border-box; display:flex; flex-direction: column; gap: 10px; }
  .row { display:flex; align-items: center; gap: 16px; background: var(--paper-3); border:1px solid var(--ink-12); padding: 12px 16px; border-radius: var(--r-lg); }
  .label { font-family: var(--font-pixel); font-size: 10px; width: 110px; color: var(--ink); }
  .bar { flex: 1; height: 16px; background: var(--ink-08); border-radius: var(--r-pill); overflow:hidden; border: 1px solid var(--ink-12); }
  .fill { height: 100%; }
  .val { font-family: var(--font-mono); font-size: 12px; color: var(--ink); width: 70px; text-align: right; }
</style>
</head>
<body>
  <div class="row">
    <span class="label">BUILD</span>
    <div class="bar"><div class="fill" style="width:68%;background:#6C5CE7"></div></div>
    <span class="val">Ready</span>
  </div>
  <div class="row">
    <span class="label">HTML</span>
    <div class="bar"><div class="fill" style="width:100%;background:#F26A4B"></div></div>
    <span class="val">Done</span>
  </div>
  <div class="row">
    <span class="label">CSS</span>
    <div class="bar"><div class="fill" style="width:40%;background:#2EC4F1"></div></div>
    <span class="val">Draft</span>
  </div>
  <div class="row">
    <span class="label">JAVASCRIPT</span>
    <div class="bar"><div class="fill" style="width:15%;background:#FFC244"></div></div>
    <span class="val">Next</span>
  </div>
</body>
</html>
