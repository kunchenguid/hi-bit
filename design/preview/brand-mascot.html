<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../tokens/colors_and_type.css">
<style>
  body { margin:0; padding: 28px; background: var(--paper); width:660px; box-sizing:border-box; display:flex; gap: 24px; align-items: center; flex-wrap: wrap; }
  .sprite { image-rendering: pixelated; }
  figure { display:flex; flex-direction: column; align-items: center; gap: 8px; margin: 0; }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--ink-64); }
</style>
</head>
<body>
  <figure>
    <img src="../assets/mascot-boo.svg" class="sprite" width="120" height="120">
    <div class="lbl">mascot-bit · full body</div>
  </figure>
  <figure>
    <img src="../assets/logo-mark.svg" class="sprite" width="80" height="80">
    <div class="lbl">logo-mark · avatar</div>
  </figure>
  <figure>
    <img src="../assets/logo-wordmark.svg" class="sprite" height="48">
    <div class="lbl">logo-wordmark</div>
  </figure>
</body>
</html>
