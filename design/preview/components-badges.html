<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../tokens/colors_and_type.css">
<style>
  body { margin:0; padding: 20px; background: var(--paper); width:660px; box-sizing:border-box; display:flex; flex-direction: column; gap: 12px; }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 14px;
    border: 2px solid #1A1626;
    border-radius: 999px;
    font-family: var(--font-pixel); font-size: 11px;
    box-shadow: 0 3px 0 0 #1A1626;
    color: #1A1626;
  }
  .sprite { width: 20px; height: 20px; image-rendering: pixelated; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
</style>
</head>
<body>
  <div class="row">
    <span class="badge" style="background:#FFC244">BUILD READY</span>
    <span class="badge" style="background:#F26A4B;color:#FFFDF5">FILES UPDATED</span>
    <span class="badge" style="background:#7BD86E">✓ BUG HUNTER</span>
    <span class="badge" style="background:#E84C88;color:#FFFDF5">♥ FAN CLUB</span>
    <span class="badge" style="background:#2EC4F1">CSS WIZARD</span>
    <span class="badge" style="background:#6C5CE7;color:#FFFDF5">BIT ONLINE</span>
  </div>
</body>
</html>
