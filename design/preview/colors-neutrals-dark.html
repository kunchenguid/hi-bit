<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../tokens/colors_and_type.css">
<style>
  body { margin:0; padding: 20px; background: #0E0D1C; width:660px; box-sizing:border-box; }
  .row { display: flex; gap: 12px; }
  .swatch { flex:1; border-radius: 12px; border:1px solid rgba(237,230,255,0.12); overflow:hidden; }
  .chip { height: 64px; display:flex; align-items:flex-end; padding: 8px 10px; font-family: 'Press Start 2P',monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em; }
  .meta { background: #201E38; padding: 8px 10px; font-family: 'Fira Code',monospace; font-size: 11px; color: rgba(237,230,255,0.64); border-top:1px solid rgba(237,230,255,0.12);}
  .meta b { color: #EDE6FF; font-weight: 500; }
</style>
</head>
<body>
  <div class="row">
    <div class="swatch">
      <div class="chip" style="background:#0E0D1C;color:#EDE6FF">NIGHT</div>
      <div class="meta"><b>--paper</b><br>#0E0D1C</div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#17162A;color:#EDE6FF">SURF-2</div>
      <div class="meta"><b>--paper-2</b><br>#17162A</div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#201E38;color:#EDE6FF">SURF-3</div>
      <div class="meta"><b>--paper-3</b><br>#201E38</div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#9890B5;color:#0E0D1C">INK-3</div>
      <div class="meta"><b>--ink-3</b><br>#9890B5</div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#EDE6FF;color:#0E0D1C">PHOSPHOR</div>
      <div class="meta"><b>--ink</b><br>#EDE6FF</div>
    </div>
  </div>
</body>
</html>
