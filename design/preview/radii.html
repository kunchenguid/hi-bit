<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../tokens/colors_and_type.css">
<style>
  body { margin:0; padding: 24px; background: var(--paper); width:660px; box-sizing:border-box; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; text-align:center; }
  .r { background: #6C5CE7; height: 72px; border: 1px solid var(--ink-12); }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--ink-64); margin-top: 8px; }
</style>
</head>
<body>
  <div class="row">
    <div><div class="r" style="border-radius:4px"></div><div class="lbl">sm · 4</div></div>
    <div><div class="r" style="border-radius:8px"></div><div class="lbl">md · 8</div></div>
    <div><div class="r" style="border-radius:12px"></div><div class="lbl">lg · 12</div></div>
    <div><div class="r" style="border-radius:16px"></div><div class="lbl">xl · 16</div></div>
    <div><div class="r" style="border-radius:999px"></div><div class="lbl">pill</div></div>
  </div>
</body>
</html>
