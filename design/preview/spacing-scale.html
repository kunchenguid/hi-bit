<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../tokens/colors_and_type.css">
<style>
  body { margin:0; padding: 24px; background: var(--paper); width:660px; box-sizing:border-box; }
  .row { display: flex; gap: 18px; align-items: flex-end; }
  .box { background: #6C5CE7; border-radius: var(--r-sm); }
  .cell { display:flex; flex-direction: column; align-items:center; gap: 6px; }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--ink-64); }
</style>
</head>
<body>
  <div class="row">
    <div class="cell"><div class="box" style="width:4px;height:4px"></div><span class="lbl">0.5 · 4</span></div>
    <div class="cell"><div class="box" style="width:8px;height:8px"></div><span class="lbl">1 · 8</span></div>
    <div class="cell"><div class="box" style="width:12px;height:12px"></div><span class="lbl">1.5 · 12</span></div>
    <div class="cell"><div class="box" style="width:16px;height:16px"></div><span class="lbl">2 · 16</span></div>
    <div class="cell"><div class="box" style="width:24px;height:24px"></div><span class="lbl">3 · 24</span></div>
    <div class="cell"><div class="box" style="width:32px;height:32px"></div><span class="lbl">4 · 32</span></div>
    <div class="cell"><div class="box" style="width:48px;height:48px"></div><span class="lbl">6 · 48</span></div>
    <div class="cell"><div class="box" style="width:64px;height:64px"></div><span class="lbl">8 · 64</span></div>
  </div>
</body>
</html>
