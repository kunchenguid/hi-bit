<!doctype html>
<html>
<head>

<link rel="stylesheet" href="../tokens/colors_and_type.css">
<style>

</head>
<body>
  <figure><img src="../assets/sticker-html.svg" class="sprite" width="80" height="80"><div class="lbl">html</div></figure>
  <figure><img src="../assets/sticker-css.svg" class="sprite" width="80" height="80"><div class="lbl">css</div></figure>
  <figure><img src="../assets/sticker-js.svg" class="sprite" width="80" height="80"><div class="lbl">js</div></figure>
  <figure><img src="../assets/sticker-art.svg" class="sprite" width="80" height="80"><div class="lbl">art</div></figure>
  <figure><img src="../assets/sticker-math.svg" class="sprite" width="80" height="80"><div class="lbl">math</div></figure>
</body>
</html>
